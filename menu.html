<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Principal - Diário Digital</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>

<div class="menu-container">
    <div class="welcome-header">
        <h2 id="userName">Olá, Professor(a)</h2>
        <p id="userSchool">Carregando unidade...</p>
    </div>

    <div class="menu-grid">
      <button class="menu-card card-new" onclick="window.location.href='formulario_infantil.html'">
    <div class="icon">📝</div>
    <span>Novo Registro</span>
</button>

<button class="menu-card card-reports" onclick="window.location.href='relatorio_professor.html'">
    <div class="icon">📂</div>
    <span>Meus Lançamentos</span>
</button>

<button class="menu-card card-stats" onclick="window.location.href='minhas_estatisticas.html'">
    <div class="icon">📊</div>
    <span>Minhas Estatísticas</span>
</button>
    </div>

    <div class="logout-area">
        <button class="btn-logout" onclick="fazerLogout()">SAIR DO SISTEMA</button>
    </div>
</div>

<script>
   window.onload = function() {
    const nome = localStorage.getItem('user_nome');
    
    if (!nome || nome === "undefined") {
        window.location.href = 'index.html';
        return;
    }

    // Pega apenas o primeiro nome para a saudação
    const primeiroNome = nome.split(' ')[0];
    document.getElementById('userName').innerText = "OLÁ, " + primeiroNome.toUpperCase();
    
    // ALTERAÇÃO: Nome fixo do painel conforme solicitado
    document.getElementById('userSchool').innerText = "PAINEL DE PLANEJAMENTO EDUCAÇÃO INFANTIL";
};

    function exibirInfoTurma() {
        const turma = localStorage.getItem('user_turma');
        const turno = localStorage.getItem('user_turno');
        alert("Dados da Turma:\n" + turma + " - " + turno);
    }

    function fazerLogout() {
        if(confirm("Deseja realmente sair do sistema?")) {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    }
</script>

</body>
</html>
