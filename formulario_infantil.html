<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Diário Digital</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>

    <style>
        /* Mantendo apenas o que é específico deste formulário */
        .card { background: white; width: 100%; max-width: 550px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); overflow: hidden; margin: auto; }
        .header { background-color: var(--blue); color: white; text-align: center; padding: 20px; }
        .header h1 { margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .content { padding: 20px; }
        .row-tripla { display: grid; grid-template-columns: 1.2fr 0.8fr 1fr; gap: 10px; margin-bottom: 15px; }
        .campo-bncc { background: #e3f2fd; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid var(--blue); }
        .lista-objetivos { max-height: 250px; overflow-y: auto; background: white; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; }
        .item-obj { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; cursor: pointer; }
        .item-obj input { width: auto; margin-top: 3px; }
        textarea { resize: vertical; }
        .btn-salvar { background-color: #2e7d32; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1 id="titulo">REGISTRO PEDAGÓGICO</h1>
    </div>

    <div class="content">
        <div class="row-tripla">
            <div>
                <label>📅 DATA</label>
                <input type="date" id="data" required>
            </div>
            <div>
                <label>🔢 AULAS</label>
                <input type="number" id="numAulas" value="1">
            </div>
            <div>
                <label>📊 BIMESTRE</label>
                <select id="bimestre">
                    <option value="1º Bimestre">1º BIMESTRE</option>
                    <option value="2º Bimestre">2º BIMESTRE</option>
                    <option value="3º Bimestre">3º BIMESTRE</option>
                    <option value="4º Bimestre">4º BIMESTRE</option>
                </select>
            </div>
        </div>

        <div class="campo-bncc">
            <label>👶 MODALIDADE/ETAPA</label>
            <select id="modalidade" onchange="popularCampos()">
                <option value="">Carregando...</option>
            </select>

            <label style="margin-top:10px;">📍 CAMPO DE EXPERIÊNCIA</label>
            <select id="campo" onchange="popularObjetivos()">
                <option value="">Selecione a modalidade primeiro</option>
            </select>
        </div>

        <label>🎯 OBJETIVOS DE APRENDIZAGEM (BNCC)</label>
        <div class="lista-objetivos" id="listaObjetivos">
            <p style="color:#999; text-align:center; font-size:12px;">Selecione um Campo de Experiência</p>
        </div>

        <label style="margin-top:15px;">📚 SABERES E CONHECIMENTO (METODOLOGIA)</label>
        <textarea id="metodologia" rows="3" placeholder="Descreva como foi a aula..."></textarea>

        <label style="margin-top:10px;">📝 METODOLOGIA/PROPOSTA ATIVA</label>
        <textarea id="observacoes" rows="2" placeholder="Opcional..."></textarea>

        <button class="btn-salvar" id="btnSalvar" onclick="salvar()">💾 Gravar Registro</button>
        
        <div style="text-align: center; margin-top: 15px; width: 100%;">
            <a href="menu.html" style="display: inline-block; width: 100%; max-width: 250px; padding: 15px; background-color: #607d8b; color: white; text-decoration: none; border-radius: 10px; font-size: 15px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: background-color 0.3s, transform 0.2s;" onmouseover="this.style.backgroundColor='#546e7a'" onmouseout="this.style.backgroundColor='#607d8b'">
                ↩️ Voltar ao Menu
            </a>
        </div>
    </div>
</div>

<script>
    let referencias = [];
    let editID = null; 

    function processarDados(data) {
        if (data.status === "sucesso" && data.dados) {
            preencherParaEdicao(data.dados);
            return;
        }

        if (data.status === "erro") {
            alert("Erro: " + data.msg);
            return;
        }
        
        referencias = data; 
        const mSel = document.getElementById('modalidade');
        const mods = [...new Set(data.map(i => i.modalidade))].filter(Boolean);
        
        mSel.innerHTML = '<option value="">Selecione...</option>';
        mods.sort().forEach(m => mSel.add(new Option(m, m)));
        
        if(editID) {
            const scriptEdit = document.createElement('script');
            scriptEdit.src = URL_SCRIPT + '?tipo=buscar_registro_por_id&id=' + editID;
            document.body.appendChild(scriptEdit);
        }
    }

    window.onload = function() {
        // SUGESTÃO APLICADA: Removida a linha que preenchia a data de hoje automaticamente.
        // Agora o campo inicia vazio para o professor selecionar.

        const urlParams = new URLSearchParams(window.location.search);
        editID = urlParams.get('editID');

        if(editID) {
            document.getElementById('titulo').innerText = "EDITAR REGISTRO";
            document.getElementById('btnSalvar').innerText = "Atualizar Registro";
        }

        const script = document.createElement('script');
        script.src = URL_SCRIPT + '?tipo=referencias';
        document.body.appendChild(script);
    };

    function preencherParaEdicao(dados) {
        // Na edição, ele continua puxando a data salva na planilha
        document.getElementById('data').value = dados.data.split('T')[0];
        document.getElementById('numAulas').value = dados.numAulas;
        document.getElementById('bimestre').value = dados.bimestre;
        document.getElementById('metodologia').value = dados.metodologia;
        document.getElementById('observacoes').value = dados.observacoes || "";

        const itemBNCC = referencias.find(r => r.objetivo === dados.objetivos.split('; ')[0]);
        if(itemBNCC) {
            document.getElementById('modalidade').value = itemBNCC.modalidade;
            popularCampos();
            document.getElementById('campo').value = dados.campo;
            popularObjetivos();
            
            const objsSalvos = dados.objetivos.split('; ');
            setTimeout(() => {
                const checks = document.getElementsByName('obj_check');
                checks.forEach(cb => {
                    if(objsSalvos.includes(cb.value)) cb.checked = true;
                });
            }, 500);
        }
    }

    function popularCampos() {
        const mod = document.getElementById('modalidade').value;
        const campoSel = document.getElementById('campo');
        campoSel.innerHTML = '<option value="">Selecione o Campo...</option>';
        const campos = [...new Set(referencias.filter(i => i.modalidade === mod).map(i => i.campo))];
        campos.forEach(c => campoSel.add(new Option(c, c)));
    }

    function popularObjetivos() {
        const mod = document.getElementById('modalidade').value;
        const campo = document.getElementById('campo').value;
        const lista = document.getElementById('listaObjetivos');
        lista.innerHTML = "";
        const filtrados = referencias.filter(i => i.modalidade === mod && i.campo === campo);
        filtrados.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'item-obj';
            div.innerHTML = `<input type="checkbox" name="obj_check" value="${item.objetivo}" id="obj${index}"><label for="obj${index}" style="font-weight:normal; margin:0;">${item.objetivo}</label>`;
            div.onclick = (e) => { if(e.target.tagName !== 'INPUT') { const cb = div.querySelector('input'); cb.checked = !cb.checked; } };
            lista.appendChild(div);
        });
    }

    function salvar() {
        const btn = document.getElementById('btnSalvar');
        const dataCampo = document.getElementById('data').value; // Pegando o valor da data
        const selecionados = Array.from(document.getElementsByName('obj_check')).filter(c => c.checked).map(c => c.value);

        // SUGESTÃO APLICADA: Validação para impedir salvamento sem data
        if (!dataCampo) { 
            alert("⚠️ Por favor, selecione a DATA do registro antes de gravar!"); 
            return; 
        }

        if (selecionados.length === 0) { alert("⚠️ Selecione ao menos um objetivo!"); return; }

        btn.disabled = true;
        btn.innerText = "Gravando...";

        const formData = new FormData();
        if(editID) formData.append("id", editID);
        
        formData.append("professor", localStorage.getItem('user_nome'));
        formData.append("escola", localStorage.getItem('user_escola'));
        formData.append("turma", localStorage.getItem('user_turma'));
        formData.append("turno", localStorage.getItem('user_turno'));
        formData.append("data", dataCampo);
        formData.append("numAulas", document.getElementById('numAulas').value);
        formData.append("bimestre", document.getElementById('bimestre').value);
        formData.append("campo", document.getElementById('campo').value);
        formData.append("objetivos", selecionados.join('; '));
        formData.append("metodologia", document.getElementById('metodologia').value);
        formData.append("observacoes", document.getElementById('observacoes').value);

        fetch(URL_SCRIPT, { method: 'POST', body: formData, mode: 'no-cors' })
            .then(() => {
                alert("✅ Registro salvo com sucesso!");
                if(editID) {
                    window.location.href = "relatorio_professor.html";
                } else {
                    btn.disabled = false;
                    btn.innerText = "Gravar Registro";
                    // Opcional: Limpar campo de data após salvar novo registro
                    document.getElementById('data').value = "";
                }
            })
            .catch(() => {
                alert("❌ Erro ao conectar.");
                btn.disabled = false;
            });
    }
</script>
</body>
</html>
