<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Diário Digital</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; width: 100%; max-width: 500px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background-color: #2196F3; color: white; text-align: center; padding: 20px; font-weight: bold; font-size: 24px; text-transform: uppercase; }
        .content { padding: 20px; }
        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        .col { flex: 1; }
        label { display: block; font-size: 11px; font-weight: bold; color: #444; margin-bottom: 5px; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; }
        .campo-aulas { background: #fff8e1; border: 1px solid #ffe082; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .btn-salvar { background-color: #2E7D32; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-cancelar { display: block; text-align: center; color: #777; text-decoration: none; margin-top: 15px; font-size: 13px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <div class="header" id="titulo">Novo Registro</div>
    <div class="content">
        <div class="row">
            <div class="col">
                <label>Bimestre:</label>
                <select id="bimestre">
                    <option value="1º Bimestre">1º Bimestre</option>
                    <option value="2º Bimestre">2º Bimestre</option>
                    <option value="3º Bimestre">3º Bimestre</option>
                    <option value="4º Bimestre">4º Bimestre</option>
                </select>
            </div>
            <div class="col">
                <label>Data:</label>
                <input type="date" id="data">
            </div>
        </div>

        <div class="campo-aulas">
            <label style="color: #f57c00;">Quantidade de Aulas:</label>
            <input type="number" id="numAulas" value="1">
        </div>

        <label>Modalidade:</label>
        <select id="modalidade" onchange="popularCampos()"><option value="">Carregando...</option></select>

        <label style="margin-top:15px;">Campo de Experiência:</label>
        <select id="campo" onchange="popularObjetivos()"><option value="">Aguardando...</option></select>

        <label style="margin-top:15px;">Objetivo de Aprendizagem:</label>
        <select id="objetivo"><option value="">Aguardando...</option></select>

        <label style="margin-top:15px;">Metodologia/Atividade:</label>
        <textarea id="metodologia"></textarea>

        <label style="margin-top:15px;">Observações:</label>
        <textarea id="observacoes"></textarea>

        <button class="btn-salvar" id="btnSalvar" onclick="salvar()">Salvar Registro</button>
        <a href="relatorio_professor.html" class="btn-cancelar" onclick="localStorage.removeItem('edit_dados')">CANCELAR</a>
    </div>
</div>

<script>
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbynk9WBrHEVOEWYAxyVbofldS4HIzbWVIESURDTs-qPP724Xv_NOXzTbp3h4TXqAPNeQA/exec'; 
    let referencias = [];
    let editID = null;

    window.onload = function() {
        // 1. Carrega as referências da planilha primeiro
        fetch(URL_SCRIPT + '?tipo=referencias')
            .then(r => r.json())
            .then(data => {
                referencias = data;
                const mSel = document.getElementById('modalidade');
                const mods = [...new Set(data.map(i => i.modalidade || i[0]))].filter(Boolean);
                
                mSel.innerHTML = '<option value="">Selecione...</option>';
                mods.sort().forEach(m => mSel.add(new Option(m, m)));

                // 2. Só depois de carregar as listas, verifica se é uma edição
                verificarEdicao();
            });
    };

    function popularCampos() {
        const mod = document.getElementById('modalidade').value;
        const cSel = document.getElementById('campo');
        cSel.innerHTML = '<option value="">Selecione...</option>';
        const filtrados = referencias.filter(i => (i.modalidade || i[0]) === mod);
        const unicos = [...new Set(filtrados.map(i => i.campo || i[1]))].filter(Boolean);
        unicos.sort().forEach(c => cSel.add(new Option(c, c)));
    }

    function popularObjetivos() {
        const mod = document.getElementById('modalidade').value;
        const camp = document.getElementById('campo').value;
        const oSel = document.getElementById('objetivo');
        oSel.innerHTML = '<option value="">Selecione...</option>';
        referencias.filter(i => (i.modalidade || i[0]) === mod && (i.campo || i[1]) === camp)
            .forEach(i => {
                const txt = i.objetivo || i[2];
                if(txt) oSel.add(new Option(txt, txt));
            });
    }

    function verificarEdicao() {
        const cache = localStorage.getItem('edit_dados');
        if (!cache) {
            document.getElementById('data').value = new Date().toISOString().split('T')[0];
            return;
        }

        const d = JSON.parse(cache);
        editID = d.id;
        document.getElementById('titulo').innerText = "Corrigir Registro";
        document.getElementById('btnSalvar').innerText = "Atualizar Dados";

        // Preenche campos de texto e data
        document.getElementById('bimestre').value = d.bimestre;
        document.getElementById('numAulas').value = d.numAulas || 1;
        document.getElementById('metodologia').value = d.metodologia;
        document.getElementById('observacoes').value = d.observacoes || "";
        
        if(d.data.includes('/')) {
            const p = d.data.split('/');
            document.getElementById('data').value = `${p[2]}-${p[1]}-${p[0]}`;
        } else {
            document.getElementById('data').value = d.data;
        }

        // Preenche os Selects em ordem (Cascata)
        document.getElementById('modalidade').value = d.modalidade || "";
        popularCampos();
        document.getElementById('campo').value = d.campo || "";
        popularObjetivos();
        document.getElementById('objetivo').value = d.objetivo || "";
    }

    function salvar() {
        const btn = document.getElementById('btnSalvar');
        btn.disabled = true;
        btn.innerText = "Salvando...";

        const params = new URLSearchParams({
            acao: 'salvar_infantil',
            id: editID || "", 
            bimestre: document.getElementById('bimestre').value,
            numAulas: document.getElementById('numAulas').value,
            data: document.getElementById('data').value,
            professor: localStorage.getItem('user_nome'),
            escola: localStorage.getItem('user_escola'),
            turma: localStorage.getItem('user_turma'),
            turno: localStorage.getItem('user_turno'),
            modalidade: document.getElementById('modalidade').value,
            campo: document.getElementById('campo').value,
            objetivos: document.getElementById('objetivo').value,
            metodologia: document.getElementById('metodologia').value,
            observacoes: document.getElementById('observacoes').value
        });

        fetch(URL_SCRIPT, { method: 'POST', body: params, mode: 'no-cors' })
            .then(() => {
                alert("Registro atualizado!");
                localStorage.removeItem('edit_dados');
                window.location.href = "relatorio_professor.html";
            });
    }
</script>
</body>
</html>
