<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Diário Digital</title>
    <style>
        :root { --blue: #1a73e8; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .login-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }

        .logo-superior { width: 100%; max-width: 150px; height: auto; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; opacity: 0.8; }
        .logo-Desenvolvedor { width: 100%; max-width: 50px; height: auto; display: block; margin: 15px auto 5px auto; }

        h2 { color: var(--blue); margin-bottom: 20px; font-size: 18px; text-transform: uppercase; }
        label { display: block; text-align: left; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        
        select, input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 14px; 
            background: #fff;
            box-sizing: border-box;
        }

        /* NOVA REGRA: Coloca Turma e Turno lado a lado */
        .row-dupla {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-login { 
            background: var(--blue); 
            color: white; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
            margin-top: 5px;
        }

        .dev-container { margin-top: 20px; padding-top: 10px; border-top: 1px solid #eee; }
        .credito { font-size: 10px; color: #888; margin: 0; letter-spacing: 0.5px; }
        #loading { color: var(--blue); font-size: 13px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://lh3.googleusercontent.com/d/1VotgpjdCZ0UreMOYpos9_wtkhvwnEZ92" class="logo-superior" alt="Logo Superior">
    
    <h2>Sistema Pedagógico</h2>
        <p>Planejamento de Aulas 2026</p>
    <div id="loading">Sincronizando dados...</div>

    <label>Selecione a Escola</label>
    <select id="selEscola"><option value="">Carregando...</option></select>

    <label>Selecione seu Nome</label>
    <select id="selProfessor"><option value="">Carregando...</option></select>

    <div class="row-dupla">
        <div>
            <label>Turma</label>
            <select id="selTurma"><option value="">Aguardando...</option></select>
        </div>
        <div>
            <label>Turno</label>
            <select id="selTurno"><option value="">Aguardando...</option></select>
        </div>
    </div>
    <label>Senha</label>
    <input type="password" id="senha" placeholder="Sua senha">

    <button class="btn-login" onclick="realizarLogin()">ENTRAR NO DIÁRIO</button>

    <div class="dev-container"> 
        <img src="https://lh3.googleusercontent.com/u/0/d/1WYPSaHqtqs8On1ikFot8z6r4q5gfBf4p" alt="Logo do Desenvolvedor" class="logo-Desenvolvedor">
        <p class="credito">v1 - Desenvolvida por: @Erivaldo Silva.</p> 
    </div>
</div>

<script>
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbx_0g4gCIkeFAXBaAklRWFq5IZFOOtZKAzM6ln98XEqu8RyKLwDTOJ0av154nG6e6Becw/exec'; 
    let dadosPlanilha = { professores: [] };

    window.onload = function() {
        fetch(URL_SCRIPT + '?tipo=docentes')
            .then(r => r.json())
            .then(data => {
                dadosPlanilha = data;
                popularSelect('selEscola', data.escolas);
                
                const selProf = document.getElementById('selProfessor');
                selProf.innerHTML = '<option value="">Escolha seu nome...</option>';
                
                data.professores.forEach(p => {
                    let nomeExibir = (typeof p === 'object') ? p.nome : p;
                    if(nomeExibir) selProf.add(new Option(nomeExibir, nomeExibir));
                });

                popularSelect('selTurma', data.turmas);
                popularSelect('selTurno', data.turnos);
                document.getElementById('loading').style.display = 'none';
            })
            .catch(err => {
                document.getElementById('loading').innerText = "Erro ao carregar dados.";
            });
    }

    function popularSelect(id, lista) {
        const sel = document.getElementById(id);
        sel.innerHTML = '<option value="">Selecione...</option>';
        if(lista) lista.forEach(item => { if(item) sel.add(new Option(item, item)); });
    }

    function realizarLogin() {
        const profNome = document.getElementById('selProfessor').value;
        const senha = document.getElementById('senha').value;
        const escola = document.getElementById('selEscola').value;
        const turma = document.getElementById('selTurma').value;
        const turno = document.getElementById('selTurno').value;

        if (!profNome || !senha) { alert("Preencha os campos!"); return; }

        const professor = dadosPlanilha.professores.find(p => (p.nome || p) === profNome);
        
        if (professor && (professor.senha === senha || !professor.senha)) {
            localStorage.setItem('user_nome', profNome);
            localStorage.setItem('user_escola', escola);
            localStorage.setItem('user_turma', turma);
            localStorage.setItem('user_turno', turno);
            localStorage.setItem('user_modalidade', professor.modalidade || ""); 
            window.location.href = 'menu.html';
        } else {
            alert("Senha incorreta!");
        }
    }
</script>
</body>
</html>
