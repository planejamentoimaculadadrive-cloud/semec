<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Diário Digital v3</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>

<div class="login-card">
    <img src="https://lh3.googleusercontent.com/d/1VotgpjdCZ0UreMOYpos9_wtkhvwnEZ92" class="logo-superior-v3" alt="Logo Diário">
    
    <h2 class="titulo-v3">Sistema Pedagógico</h2>
    <p class="subtitulo-v3">Planejamento de Aulas 2026</p>
    
    <div id="loading" style="color: #1a73e8; font-weight: bold; margin-bottom: 10px;">Sincronizando com a nuvem...</div>

    <label>🖍 Selecione seu nome</label>
    <select id="selProfessor" onchange="autoPreencher()">  
        <option value="">Escolha seu nome...</option>
    </select>

    <label>🚸 Escola</label>
    <select id="selEscola">
        <option value="">Selecione o professor primeiro...</option>
    </select>

    <div class="row-dupla">
        <div>
            <label>👫 Turma</label>
            <select id="selTurma"><option value="">---</option></select>   
        </div>
        <div>
            <label>⏰ Turno</label>
            <select id="selTurno">
                <option value="">---</option>
                <option value="MANHÃ">MANHÃ</option>
                <option value="TARDE">TARDE</option>
                <option value="INTEGRAL">INTEGRAL</option>
            </select>
        </div>
    </div>

    <label>🔒 Senha de Acesso</label>
    <input type="password" id="senha" placeholder="Digite sua senha">

    <button class="btn-login-v3" onclick="realizarLogin()">👉 ENTRAR NO DIÁRIO</button>  

    <button class="btn-coord-v3" onclick="window.location.href='portal_coordenacao.html'">  
       🖥ACESSO COORDENAÇÃO
    </button>

    <div class="dev-container"> 
        <img src="https://lh3.googleusercontent.com/d/1WYPSaHqtqs8On1ikFot8z6r4q5gfBf4p" class="logo-footer-v3">
        <p class="credito-v3">v3.0 - Desenvolvido por: @Erivaldo Silva.</p> 
    </div>
</div>

<script>
    // Mantendo toda a sua lógica original de script como solicitado
    let dadosPlanilha = { professores: [] };

    function processarDados(data) {
        if(data.status === "erro") {
            document.getElementById('loading').innerText = "Erro: " + data.msg;
            return;
        }
        dadosPlanilha = data;
        const selProf = document.getElementById('selProfessor');
        selProf.innerHTML = '<option value="">Escolha seu nome...</option>';
        data.professores.sort((a, b) => a.nome.localeCompare(b.nome)).forEach(p => {
            selProf.add(new Option(p.nome, p.nome));
        });
        document.getElementById('loading').style.display = 'none';
    }

    function autoPreencher() {
        const nomeSel = document.getElementById('selProfessor').value;
        const prof = dadosPlanilha.professores.find(p => p.nome === nomeSel);
        const selEscola = document.getElementById('selEscola');
        const selTurma = document.getElementById('selTurma');
        const selTurno = document.getElementById('selTurno');

        if (prof) {
            selEscola.innerHTML = `<option value="${prof.escola}">${prof.escola}</option>`;
            selTurma.innerHTML = `<option value="${prof.turma}">${prof.turma}</option>`;
            const turnoPlanilha = String(prof.turno).trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            let encontrou = false;
            for (let i = 0; i < selTurno.options.length; i++) {
                const opcaoTexto = selTurno.options[i].value.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                if (opcaoTexto === turnoPlanilha && turnoPlanilha !== "") {
                    selTurno.selectedIndex = i;
                    encontrou = true;
                    break;
                }
            }
            if (!encontrou && prof.turno) {
               selTurno.innerHTML += `<option value="${prof.turno.toUpperCase()}">${prof.turno.toUpperCase()}</option>`;
               selTurno.value = prof.turno.toUpperCase();
            }
        } else {
            selEscola.innerHTML = '<option value="">---</option>';
            selTurma.innerHTML = '<option value="">---</option>';
            selTurno.value = "";
        }
    }

    window.onload = function() {
        const script = document.createElement('script');
        script.src = URL_SCRIPT + '?tipo=configuracoes&t=' + new Date().getTime();
        document.body.appendChild(script);
    }

    function realizarLogin() {
        const profNome = document.getElementById('selProfessor').value;
        const senha = document.getElementById('senha').value;
        if (!profNome || !senha) { alert("Escolha o professor e digite a senha!"); return; }
        const professor = dadosPlanilha.professores.find(p => p.nome === profNome);
        if (professor && (String(professor.senha).trim() === String(senha).trim())) {
            localStorage.setItem('user_nome', profNome);
            localStorage.setItem('user_escola', document.getElementById('selEscola').value);
            localStorage.setItem('user_turma', document.getElementById('selTurma').value);
            localStorage.setItem('user_turno', document.getElementById('selTurno').value);
            window.location.href = 'menu.html';
        } else {
            alert("Senha incorreta!");
        }
    }
</script>
</body>
</html>
