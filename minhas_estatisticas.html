<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Estatísticas - Diário Digital</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    
    <style>
        :root { 
            --blue: #1a73e8; 
            --gray: #5f6368; 
            --light: #f8f9fa;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 800px; margin: auto; }
        .header { background: var(--blue); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-stats { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; overflow-x: auto; }
        h3 { color: var(--blue); border-bottom: 2px solid var(--blue); padding-bottom: 8px; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background: var(--light); color: var(--gray); text-align: left; padding: 12px; border-bottom: 2px solid #dee2e6; text-transform: uppercase; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .total-anual { font-weight: bold; color: #2e7d32; background: #e8f5e9; }
        .total-col { font-weight: bold; background: #f1f3f4; }
        .btn-voltar { display: block; width: 100%; padding: 15px; background: var(--gray); color: white; text-align: center; text-decoration: none; border-radius: 10px; margin-top: 20px; font-weight: bold; box-sizing: border-box; }
        .btn-print { background: #1e8e3e; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 15px; width: 100%; font-size: 14px; }
        #loader { text-align: center; padding: 40px; font-weight: bold; color: var(--blue); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">Estatísticas de Carga Horária</h2>
        <span id="txtProf">Carregando professor...</span>
    </div>

    <div id="loader">Calculando totais de aulas...</div>

    <div class="card-stats" id="quadroEstatisticas" style="display:none;">
        <h3>Aulas por Campo de Experiência</h3>
        <button class="btn-print" onclick="imprimirEstatisticas()">🖨️ IMPRIMIR RESUMO ESTATÍSTICO</button>

        <table id="tabelaStats">
            <thead>
                <tr>
                    <th>Campo de Experiência</th>
                    <th>1º Bim</th>
                    <th>2º Bim</th>
                    <th>3º Bim</th>
                    <th>4º Bim</th>
                    <th class="total-col">Total Anual</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>

    <a href="menu.html" class="btn-voltar">VOLTAR AO MENU</a>
</div>

<script>
    // Tenta pegar a URL do config.js ou usa a URL direta como Plano B
    var SCRIPT_URL_FINAL = (typeof URL_SCRIPT !== 'undefined') ? URL_SCRIPT : 'https://script.google.com/macros/s/AKfycbw2Ie7Pjctnep9it3q-CUj9Dv216uT7DDSCtfb387OX8soT15dbT-h5k09pbRVG7KGf/exec';

    const profLogado = localStorage.getItem('user_nome');
    document.getElementById('txtProf').innerText = "Prof(a): " + (profLogado || "");

    window.onload = () => {
        if(!profLogado) { window.location.href='index.html'; return; }
        gerarEstatisticas();
    };

    // FUNÇÃO QUE RECEBE OS DADOS DO GOOGLE (JSONP)
    function processarDados(data) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('quadroEstatisticas').style.display = 'block';

        if (!data || data.length === 0 || data.status === "erro") {
            document.getElementById('corpoTabela').innerHTML = "<tr><td colspan='6' style='text-align:center;'>Nenhum registro encontrado para este professor.</td></tr>";
            return;
        }

        const resumo = {};
        data.forEach(reg => {
            const campo = reg.campo || "Não informado";
            const bimestre = reg.bimestre ? reg.bimestre.trim() : ""; 
            const aulas = parseInt(reg.numAulas) || 0;

            if (!resumo[campo]) {
                resumo[campo] = { "1º BIMESTRE": 0, "2º BIMESTRE": 0, "3º BIMESTRE": 0, "4º BIMESTRE": 0 };
            }
            
            // Verifica se o bimestre existe no objeto (converte para maiúsculo para bater com o padrão)
            const bimChave = bimestre.toUpperCase();
            if (resumo[campo].hasOwnProperty(bimChave)) {
                resumo[campo][bimChave] += aulas;
            }
        });

        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        
        Object.keys(resumo).sort().forEach(campo => {
            const b1 = resumo[campo]["1º BIMESTRE"], 
                  b2 = resumo[campo]["2º BIMESTRE"], 
                  b3 = resumo[campo]["3º BIMESTRE"], 
                  b4 = resumo[campo]["4º BIMESTRE"];
            const total = b1 + b2 + b3 + b4;
            
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><b>${campo}</b></td><td>${b1}</td><td>${b2}</td><td>${b3}</td><td>${b4}</td><td class="total-anual">${total}</td>`;
            corpo.appendChild(tr);
        });
    }

    function gerarEstatisticas() {
        // Chamada via script tag para evitar erro de CORS
        const script = document.createElement('script');
        script.src = SCRIPT_URL_FINAL + "?tipo=ler_registros&professor=" + encodeURIComponent(profLogado) + "&callback=processarDados";
        
        script.onerror = function() {
            document.getElementById('loader').innerHTML = "⚠️ Erro ao conectar com o servidor Google.";
        };
        
        document.body.appendChild(script);
    }

    function imprimirEstatisticas() {
        const tabela = document.getElementById('tabelaStats').outerHTML;
        const win = window.open('', '_blank');
        win.document.write(`<html><head><title>Estatísticas</title><style>body{font-family:sans-serif;padding:20px;}table{width:100%;border-collapse:collapse;margin-top:20px;}th,td{border:1px solid #ccc;padding:8px;text-align:left;}th{background:#f2f2f2;}.total-anual{font-weight:bold;background:#e8f5e9;}h2{color:#1a73e8;text-align:center;}</style></head><body><h2>Resumo de Carga Horária - 2026</h2><p><b>Professor(a):</b> ${profLogado}</p><hr>${tabela}<script>window.onload=function(){window.print();setTimeout(window.close,500);};<\/script></body></html>`);
        win.document.close();
    }
</script>
</body>
</html>
