<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Registros</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; }
        .registro { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #1a73e8; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .data { font-weight: bold; color: #1a73e8; }
        .btn-voltar { background: #666; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>
    <button class="btn-voltar" onclick="location.href='menu.html'">← Voltar ao Menu</button>
    <h2>Meu Histórico de Aulas</h2>
    <div id="listaRegistros">Carregando...</div>

<script>
    const urlScript = 'https://script.google.com/macros/s/AKfycbxdQht0Ek7Y8o8p8QUbhynYK2yAhw0mXhwjYE6Dt7er9CYBtAgJCjXacntEXYcKTDLkNQ/exec';
    const meuNome = localStorage.getItem('user');

    window.onload = () => {
        fetch(urlScript + '?tipo=ler_registros')
        .then(r => r.json())
        .then(data => {
            const meus = data.filter(r => r.professor === meuNome);
            if(meus.length === 0) {
                document.getElementById('listaRegistros').innerHTML = "Nenhum registro encontrado.";
                return;
            }
            const html = meus.map(r => `
                <div class="registro">
                    <div class="data">${new Date(r.data).toLocaleDateString('pt-BR')}</div>
                    <div><strong>Campo:</strong> ${r.campo}</div>
                    <div style="font-size: 13px; color: #555; margin-top:5px;">${r.metodologia}</div>
                </div>
            `).join('');
            document.getElementById('listaRegistros').innerHTML = html;
        });
    };
</script>
</body>
</html>
